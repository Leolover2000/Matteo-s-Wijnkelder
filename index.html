<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matteo's Wijnkelder</title>
    <meta name="description" content="De persoonlijke wijnkelder van Matteo — beheer je collectie met stijl.">
    <meta name="theme-color" content="#2c1810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wijnkelder">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy-deep: #1a1a1a;
            --burgundy: #2a2a2a;
            --oak-dark: #141414;
            --oak: #1e1e1e;
            --oak-light: #333333;
            --gold: #b8976a;
            --gold-light: #cbaa7d;
            --gold-dim: rgba(184,151,106,0.2);
            --parchment: #e8e0d4;
            --parchment-dark: #d4ccc0;
            --stone-dark: #0a0a0a;
            --stone: #111111;
            --stone-card: #181818;
            --text-light: #d4ccc0;
            --text-muted: #7a7268;
            --danger: #8b3a3a;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background-color: var(--stone-dark);
            color: var(--text-light);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            overscroll-behavior: none;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(184,151,106,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(184,151,106,0.02) 0%, transparent 50%);
        }
        /* Subtle stone texture overlay */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* === ANIMATIONS === */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

        /* === LOGIN === */
        #login-sectie {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; padding: 20px; position: relative; z-index: 1;
        }
        .login-bg-glow {
            position: absolute; width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
            top: 20%; left: 50%; transform: translateX(-50%); pointer-events: none;
        }
        .login-box {
            background: linear-gradient(145deg, var(--stone-card), var(--stone));
            padding: 40px 30px; border-radius: var(--radius); width: 100%; max-width: 380px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(201,169,110,0.1);
            text-align: center; position: relative; z-index: 1;
            border: 1px solid rgba(201,169,110,0.08);
            animation: fadeInUp 0.8s ease;
        }
        .login-logo {
            width: 80px; height: 80px; margin: 0 auto 16px; border-radius: 20px;
            background: linear-gradient(135deg, #1e1e1e, #0e0e0e);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .login-logo svg { width: 44px; height: 44px; }
        .login-box h2 {
            font-family: 'Playfair Display', Georgia, serif; font-size: 26px;
            color: var(--gold); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px;
        }
        .login-subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; font-weight: 300; }
        .login-divider {
            height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
            margin-bottom: 28px;
        }
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: var(--text-muted); pointer-events: none;
        }
        .input-field {
            width: 100%; padding: 14px 14px 14px 44px; background: rgba(255,255,255,0.04);
            color: var(--text-light); border: 1px solid rgba(201,169,110,0.12); border-radius: 8px;
            font-family: 'Cormorant Garamond', serif; font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-field::placeholder { color: var(--text-muted); opacity: 0.6; }
        .input-field:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }

        .btn-primary {
            width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600;
            background: linear-gradient(135deg, #252525, #1a1a1a);
            color: var(--gold-light); letter-spacing: 0.5px;
            border: 1px solid rgba(184,151,106,0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .foutmelding { color: var(--danger); font-size: 14px; margin-top: 14px; display: none; }

        /* === APP SHELL === */
        #app-sectie { display: none; flex: 1; flex-direction: column; position: relative; z-index: 1; }

        header {
            background: linear-gradient(to bottom, var(--oak-dark), var(--stone-dark));
            text-align: center; padding: calc(16px + var(--safe-top)) 16px 14px;
            position: relative; border-bottom: 1px solid rgba(201,169,110,0.1);
        }
        header h1 {
            font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold);
            font-weight: 600; letter-spacing: 1px;
        }
        header .subtitle { font-size: 12px; color: var(--text-muted); font-weight: 300; margin-top: 2px; letter-spacing: 2px; text-transform: uppercase; }
        .uitlog-knop {
            position: absolute; right: 16px; top: calc(16px + var(--safe-top));
            background: none; border: 1px solid rgba(201,169,110,0.2); color: var(--text-muted);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
            font-family: 'Cormorant Garamond', serif; transition: all 0.2s;
        }
        .uitlog-knop:active { background: rgba(201,169,110,0.1); }

        /* === BOTTOM NAV === */
        nav {
            display: flex; background: linear-gradient(to top, var(--stone-dark), var(--stone));
            border-top: 1px solid rgba(201,169,110,0.08);
            padding-bottom: var(--safe-bottom); position: sticky; bottom: 0; z-index: 10;
        }
        nav button {
            flex: 1; padding: 10px 0 8px; background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: all 0.2s; position: relative;
        }
        nav button svg { width: 22px; height: 22px; color: var(--text-muted); transition: color 0.2s; }
        nav button span { font-size: 11px; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; font-weight: 500; transition: color 0.2s; }
        nav button.actief svg { color: var(--gold); }
        nav button.actief span { color: var(--gold); }
        nav button.actief::before {
            content: ''; position: absolute; top: 0; left: 25%; right: 25%;
            height: 2px; background: var(--gold); border-radius: 0 0 2px 2px;
        }

        /* === MAIN CONTENT === */
        main { padding: 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
        .scherm { display: none; }
        .scherm.actief { display: block; animation: fadeIn 0.3s ease; }

        /* === STATS BAR === */
        .stats-bar {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .stat-item {
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,169,110,0.08);
            border-radius: 10px; padding: 12px 8px; text-align: center;
        }
        .stat-number { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }

        /* === FILTER CONTROLS === */
        .controls { display: flex; gap: 8px; margin-bottom: 16px; }
        .controls select {
            flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.04);
            color: var(--text-light); border: 1px solid rgba(201,169,110,0.12); border-radius: 8px;
            font-family: 'Cormorant Garamond', serif; font-size: 15px;
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23c9a96e' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 12px center;
        }
        .controls select:focus { outline: none; border-color: var(--gold); }

        /* === WINE CARDS === */
        .wijn-kaart {
            background: linear-gradient(145deg, var(--stone-card), rgba(36,20,20,0.8));
            border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
            border: 1px solid rgba(201,169,110,0.06);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeInUp 0.4s ease backwards;
            transition: transform 0.2s;
        }
        .wijn-kaart:active { transform: scale(0.99); }
        .wijn-info { flex: 1; min-width: 0; }
        .wijn-kleur-indicator {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .kleur-rood { background: #9b2335; box-shadow: 0 0 6px rgba(155,35,53,0.4); }
        .kleur-wit { background: #e8dcc8; box-shadow: 0 0 6px rgba(232,220,200,0.3); }
        .kleur-rose { background: #d4708f; box-shadow: 0 0 6px rgba(212,112,143,0.4); }
        .kleur-champagne { background: #daa520; box-shadow: 0 0 6px rgba(218,165,32,0.4); }
        .kleur-anders { background: var(--text-muted); }
        .wijn-naam {
            font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600;
            color: var(--parchment); margin-bottom: 6px; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .wijn-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--text-muted); }
        .wijn-meta-item { display: flex; align-items: center; gap: 4px; }
        .wijn-meta-item svg { width: 14px; height: 14px; color: var(--gold); opacity: 0.6; flex-shrink: 0; }
        .wijn-tag {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.12);
            padding: 3px 8px; border-radius: 20px; font-size: 11px; color: var(--gold-light);
            margin-top: 8px;
        }
        .wijn-tag svg { width: 12px; height: 12px; }
        .verwijder-knop {
            position: absolute; top: 12px; right: 12px; background: rgba(192,57,43,0.1);
            border: none; color: var(--danger); width: 28px; height: 28px; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; opacity: 0.6;
        }
        .verwijder-knop:active { background: rgba(192,57,43,0.25); opacity: 1; }
        .verwijder-knop svg { width: 16px; height: 16px; }

        /* === ADD FORM === */
        .form-section { margin-bottom: 20px; }
        .form-section label {
            display: block; margin-bottom: 6px; color: var(--gold); font-size: 13px;
            font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
        }
        .form-section input, .form-section select {
            width: 100%; padding: 13px 14px; background: rgba(255,255,255,0.04);
            color: var(--text-light); border: 1px solid rgba(201,169,110,0.12); border-radius: 8px;
            font-family: 'Cormorant Garamond', serif; font-size: 16px; transition: border-color 0.3s;
        }
        .form-section input::placeholder { color: var(--text-muted); opacity: 0.5; }
        .form-section input:focus, .form-section select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }



        .laad-scherm { text-align: center; color: var(--text-muted); margin-top: 60px; font-style: italic; font-size: 16px; }
        .laad-scherm .loader { animation: pulse 1.5s infinite; }
        .empty-state { text-align: center; margin-top: 60px; }
        .empty-state svg { width: 48px; height: 48px; color: var(--text-muted); opacity: 0.2; margin-bottom: 12px; }
        .empty-state p { color: var(--text-muted); font-size: 15px; }



        /* Notificatie toast */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--oak-dark); color: var(--gold-light); padding: 12px 24px;
            border-radius: 30px; font-size: 14px; border: 1px solid rgba(201,169,110,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 50; opacity: 0;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events: none;
        }
        .toast.toon { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* === DETAIL MODAL === */
        .detail-modal {
            display: none; position: fixed; inset: 0; z-index: 90;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            justify-content: flex-end; align-items: stretch; flex-direction: column;
        }
        .detail-modal.actief { display: flex; animation: fadeIn 0.2s ease; }
        .detail-overlay { flex: 1; }
        .detail-sheet {
            background: linear-gradient(to bottom, #1c1c1c, #0e0e0e);
            border-radius: 20px 20px 0 0; padding: 24px 20px calc(24px + var(--safe-bottom));
            max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
            border-top: 1px solid rgba(184,151,106,0.12);
            animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .detail-handle {
            width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px;
            margin: 0 auto 20px;
        }
        .detail-header { display: flex; gap: 14px; margin-bottom: 20px; }
        .detail-title {
            font-family: 'Playfair Display', serif; font-size: 22px; color: var(--parchment);
            font-weight: 600; margin-bottom: 4px;
        }
        .detail-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
        .detail-info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;
        }
        .detail-info-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(184,151,106,0.08);
            border-radius: 10px; padding: 12px; text-align: center;
        }
        .detail-info-value { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); font-weight: 600; }
        .detail-info-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* Quantity controls */
        .detail-section { margin-bottom: 20px; }
        .detail-section-title {
            font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 10px; font-weight: 500;
        }
        .qty-controls {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(184,151,106,0.1);
            border-radius: 12px; padding: 12px;
        }
        .qty-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(184,151,106,0.2);
            background: rgba(255,255,255,0.04); color: var(--gold); font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: 'Cormorant Garamond', serif;
        }
        .qty-btn:active { background: rgba(184,151,106,0.15); transform: scale(0.95); }
        .qty-value {
            font-family: 'Playfair Display', serif; font-size: 28px; color: var(--parchment);
            min-width: 40px; text-align: center;
        }

        .detail-actions { display: flex; gap: 10px; margin-top: 8px; }
        .detail-actions button {
            flex: 1; padding: 14px; border-radius: 10px; font-family: 'Playfair Display', serif;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-detail-save {
            background: linear-gradient(135deg, #252525, #1a1a1a); color: var(--gold-light);
            border: 1px solid rgba(184,151,106,0.2);
        }
        .btn-detail-save:active { transform: scale(0.98); }

        /* Delete choice buttons */
        .delete-choice { display: flex; gap: 10px; margin-top: 8px; }
        .delete-choice button {
            flex: 1; padding: 14px; border-radius: 10px; font-family: 'Playfair Display', serif;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-opgedronken {
            background: rgba(184,151,106,0.1); color: var(--gold-light);
            border: 1px solid rgba(184,151,106,0.2);
        }
        .btn-opgedronken:active { background: rgba(184,151,106,0.2); }
        .btn-echt-verwijderen {
            background: rgba(139,58,58,0.1); color: var(--danger);
            border: 1px solid rgba(139,58,58,0.2);
        }
        .btn-echt-verwijderen:active { background: rgba(139,58,58,0.2); }

        /* Review modal */
        .review-modal {
            display: none; position: fixed; inset: 0; z-index: 95;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            justify-content: center; align-items: center; padding: 20px;
        }
        .review-modal.actief { display: flex; animation: fadeIn 0.2s ease; }
        .review-sheet {
            background: linear-gradient(to bottom, #1c1c1c, #0e0e0e);
            border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 340px;
            border: 1px solid rgba(184,151,106,0.12);
            animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .review-title {
            font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold);
            text-align: center; margin-bottom: 20px;
        }
        .review-score-wrap { text-align: center; margin-bottom: 20px; }
        .review-score-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .review-score-display {
            font-family: 'Playfair Display', serif; font-size: 48px; color: var(--gold); font-weight: 700;
        }
        .review-score-slider {
            width: 100%; margin-top: 8px; accent-color: var(--gold);
            -webkit-appearance: none; appearance: none; height: 4px;
            background: rgba(184,151,106,0.2); border-radius: 2px; outline: none;
        }
        .review-score-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
            background: var(--gold); cursor: pointer;
        }
        .review-notitie {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.04);
            color: var(--text-light); border: 1px solid rgba(184,151,106,0.12); border-radius: 8px;
            font-family: 'Cormorant Garamond', serif; font-size: 15px; resize: vertical;
            min-height: 70px; margin-bottom: 16px;
        }
        .review-notitie::placeholder { color: var(--text-muted); opacity: 0.5; }
        .review-notitie:focus { outline: none; border-color: var(--gold); }
        .review-actions { display: flex; gap: 10px; }
        .review-actions button {
            flex: 1; padding: 13px; border-radius: 10px; font-family: 'Playfair Display', serif;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-review-skip {
            background: rgba(255,255,255,0.04); color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-review-submit {
            background: linear-gradient(135deg, #252525, #1a1a1a); color: var(--gold-light);
            border: 1px solid rgba(184,151,106,0.2);
        }

        /* Collapsible accordion */
        .kleur-groep { margin-bottom: 10px; }
        .kleur-groep-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(184,151,106,0.08); border-radius: 10px;
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .kleur-groep-header:active { background: rgba(184,151,106,0.06); }
        .kleur-groep-header.open { border-radius: 10px 10px 0 0; border-bottom: none; }
        .kleur-groep-left { display: flex; align-items: center; gap: 10px; }
        .kleur-groep-dot {
            width: 10px; height: 10px; border-radius: 50;
        }
        .kleur-groep-naam {
            font-family: 'Playfair Display', serif; font-size: 16px; color: var(--parchment); font-weight: 600;
        }
        .kleur-groep-count {
            font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .kleur-groep-chevron {
            width: 16px; height: 16px; color: var(--text-muted); transition: transform 0.3s;
        }
        .kleur-groep-header.open .kleur-groep-chevron { transform: rotate(180deg); }
        .kleur-groep-body {
            display: none; padding: 8px 0 0; border: 1px solid rgba(184,151,106,0.08);
            border-top: none; border-radius: 0 0 10px 10px;
            background: rgba(255,255,255,0.01); padding: 8px;
        }
        .kleur-groep-body.open { display: block; }
        .kleur-groep-body .wijn-kaart { margin-bottom: 8px; }
        .kleur-groep-body .wijn-kaart:last-child { margin-bottom: 0; }
    </style>
</head>
<body>


    <!-- DETAIL MODAL -->
    <div class="detail-modal" id="detail-modal">
        <div class="detail-overlay" id="detail-overlay"></div>
        <div class="detail-sheet">
            <div class="detail-handle"></div>
            <div class="detail-header">
                <div>
                    <div class="detail-title" id="detail-title"></div>
                    <div class="detail-subtitle" id="detail-subtitle"></div>
                </div>
            </div>
            <div class="detail-info-grid" id="detail-info-grid"></div>
            <div class="detail-section">
                <div class="detail-section-title">Aantal flessen</div>
                <div class="qty-controls">
                    <button class="qty-btn" id="qty-min">−</button>
                    <div class="qty-value" id="qty-value">1</div>
                    <button class="qty-btn" id="qty-plus">+</button>
                </div>
            </div>
            <div class="detail-actions">
                <button class="btn-detail-save" id="detail-save">Opslaan</button>
            </div>
            <div style="margin-top:12px;">
                <div class="detail-section-title" style="margin-bottom:8px;">Uit de kelder halen</div>
                <div class="delete-choice">
                    <button class="btn-echt-verwijderen" id="detail-delete">Verwijderen</button>
                    <button class="btn-opgedronken" id="detail-opgedronken">Opgedronken</button>
                </div>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div class="review-modal" id="review-modal">
        <div class="review-sheet">
            <div class="review-title">Beoordeling</div>
            <div class="review-score-wrap">
                <div class="review-score-label">Cijfer</div>
                <div class="review-score-display" id="review-score-display">7</div>
                <input type="range" min="1" max="10" value="7" class="review-score-slider" id="review-score-slider">
            </div>
            <textarea class="review-notitie" id="review-notitie" placeholder="Proefnotitie (optioneel)..."></textarea>
            <div class="review-actions">
                <button class="btn-review-skip" id="review-skip">Geen review</button>
                <button class="btn-review-submit" id="review-submit">Indienen</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- LOGIN -->
    <div id="login-sectie">
        <div class="login-bg-glow"></div>
        <div class="login-box">
            <div class="login-logo">
                <img src="icon-192.png" alt="Logo" style="width:60px;height:60px;border-radius:12px;">
            </div>
            <h2>Matteo's Wijnkelder</h2>
            <p class="login-subtitle">Persoonlijke Collectie</p>
            <div class="login-divider"></div>
            <form id="login-formulier">
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/></svg>
                    <input class="input-field" type="email" id="login-email" placeholder="E-mailadres" required>
                </div>
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M12 16v2M8 11V7a4 4 0 018 0v4"/></svg>
                    <input class="input-field" type="password" id="login-wachtwoord" placeholder="Wachtwoord" required>
                </div>
                <button type="submit" class="btn-primary" id="login-knop">Kluis Openen</button>
                <div id="login-fout" class="foutmelding">Inloggegevens onjuist.</div>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="app-sectie">
        <header>
            <img src="icon-192.png" alt="Logo" style="width:36px;height:36px;border-radius:8px;margin-bottom:6px;">
            <h1>Matteo's Wijnkelder</h1>
            <p class="subtitle">Persoonlijke Collectie</p>
            <button class="uitlog-knop" id="uitlog-knop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Uit
            </button>
        </header>

        <main>
            <!-- KELDER -->
            <section id="scherm-kelder" class="scherm actief">
                <div class="stats-bar" id="stats-bar">
                    <div class="stat-item"><div class="stat-number" id="stat-totaal">0</div><div class="stat-label">Flessen</div></div>
                    <div class="stat-item"><div class="stat-number" id="stat-rood">0</div><div class="stat-label">Rood</div></div>
                    <div class="stat-item"><div class="stat-number" id="stat-wit">0</div><div class="stat-label">Wit</div></div>
                </div>
                <div id="wijn-lijst">
                    <div class="laad-scherm"><span class="loader">Kelder wordt geopend...</span></div>
                </div>
            </section>

            <!-- TOEVOEGEN -->
            <section id="scherm-toevoegen" class="scherm">
                <form id="toevoeg-formulier">

                    <div class="form-section"><label>Naam van de wijn</label><input type="text" id="invoer-naam" placeholder="Bijv. Château Margaux 2015"></div>
                    <div class="form-section">
                        <label>Kleur</label>
                        <select id="invoer-kleur">
                            <option value="Rood">Rood</option><option value="Wit">Wit</option>
                            <option value="Rosé">Rosé</option><option value="Champagne">Champagne</option>
                            <option value="Anders">Anders</option>
                        </select>
                    </div>
                    <div class="form-section"><label>Jaartal</label><input type="number" id="invoer-jaartal" placeholder="Bijv. 2018"></div>
                    <div class="form-section"><label>Aantal</label><input type="number" id="invoer-aantal" placeholder="Bijv. 1" min="1" value="1"></div>
                    <div class="form-section"><label>Prijs in €</label><input type="number" step="0.01" id="invoer-prijs" placeholder="Bijv. 25.50"></div>
                    <div class="form-section"><label>Op smaak vanaf jaar</label><input type="number" id="invoer-smaak" placeholder="Bijv. 2028"></div>
                    <button type="submit" class="btn-primary" id="opslaan-knop">Opslaan in Kelder</button>
                </form>
            </section>

            <!-- GEDRONKEN -->
            <section id="scherm-gedronken" class="scherm">
                <div style="text-align:center;margin-bottom:16px;">
                    <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:4px;">Proefnotities</div>
                    <div style="font-size:13px;color:var(--text-muted);">Wijnen die je hebt gedronken en beoordeeld</div>
                </div>
                <div id="gedronken-lijst"></div>
            </section>
        </main>

        <!-- BOTTOM NAV -->
        <nav>
            <button id="tab-kelder" class="actief">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>
                <span>Kelder</span>
            </button>
            <button id="tab-gedronken">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2h8l-1 7H9L8 2z"/><path d="M12 9v6"/><path d="M7 21h10"/><path d="M9 15h6"/></svg>
                <span>Gedronken</span>
            </button>
            <button id="tab-toevoegen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                <span>Toevoegen</span>
            </button>
        </nav>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD8rkb6u4zVHQUBwKo0lfvhX17L5cz31I8",
        authDomain: "matteo-s-wijnkelder.firebaseapp.com",
        projectId: "matteo-s-wijnkelder",
        storageBucket: "matteo-s-wijnkelder.firebasestorage.app",
        messagingSenderId: "800713019050",
        appId: "1:800713019050:web:ec3721b135b7a56e1acad3",
        measurementId: "G-M7DZ2P016W"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let wijnen = [];
    let huidigeWijnId = null; // For detail modal
    let huidigeAantal = 1;

    // UI Refs
    const loginSectie = document.getElementById('login-sectie');
    const appSectie = document.getElementById('app-sectie');
    const loginForm = document.getElementById('login-formulier');
    const loginFout = document.getElementById('login-fout');
    const wijnLijst = document.getElementById('wijn-lijst');

    // === TOAST ===
    function toonToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('toon');
        setTimeout(() => t.classList.remove('toon'), 2500);
    }

    // === AUTH ===
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginSectie.style.display = 'none';
            appSectie.style.display = 'flex';
            haalWijnenOp();
        } else {
            loginSectie.style.display = 'flex';
            appSectie.style.display = 'none';
        }
    });

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const ww = document.getElementById('login-wachtwoord').value;
        const knop = document.getElementById('login-knop');
        knop.innerText = "Bezig...";
        loginFout.style.display = 'none';
        signInWithEmailAndPassword(auth, email, ww)
            .then(() => { knop.innerText = "Kluis Openen"; loginForm.reset(); })
            .catch(() => { knop.innerText = "Kluis Openen"; loginFout.style.display = 'block'; });
    });

    document.getElementById('uitlog-knop').addEventListener('click', () => signOut(auth));

    // === DETAIL MODAL ===
    const detailModal = document.getElementById('detail-modal');
    document.getElementById('detail-overlay').addEventListener('click', () => detailModal.classList.remove('actief'));

    // Qty buttons
    document.getElementById('qty-plus').addEventListener('click', () => {
        huidigeAantal++;
        document.getElementById('qty-value').textContent = huidigeAantal;
    });
    document.getElementById('qty-min').addEventListener('click', () => {
        if (huidigeAantal > 0) huidigeAantal--;
        document.getElementById('qty-value').textContent = huidigeAantal;
    });

    // Open detail
    window.openDetail = function(id) {
        const wijn = wijnen.find(w => w.id === id);
        if (!wijn) return;
        huidigeWijnId = id;
        huidigeAantal = wijn.aantal || 1;

        document.getElementById('detail-title').textContent = wijn.naam;
        const kleurTxt = wijn.kleur || '';
        const jaarTxt = wijn.jaartal ? `\u2022 ${wijn.jaartal}` : '';
        document.getElementById('detail-subtitle').textContent = `${kleurTxt} ${jaarTxt}`.trim();

        const grid = document.getElementById('detail-info-grid');
        const prijs = wijn.prijs > 0 ? `\u20ac${wijn.prijs.toFixed(2)}` : '\u2014';
        const smaak = wijn.smaakVanaf || '\u2014';
        grid.innerHTML = `
            <div class="detail-info-item"><div class="detail-info-value">${wijn.jaartal || '\u2014'}</div><div class="detail-info-label">Jaartal</div></div>
            <div class="detail-info-item"><div class="detail-info-value">${prijs}</div><div class="detail-info-label">Prijs</div></div>
            <div class="detail-info-item"><div class="detail-info-value">${wijn.kleur || '\u2014'}</div><div class="detail-info-label">Kleur</div></div>
            <div class="detail-info-item"><div class="detail-info-value">${smaak}</div><div class="detail-info-label">Op smaak</div></div>
        `;

        document.getElementById('qty-value').textContent = huidigeAantal;
        detailModal.classList.add('actief');
    };

    // Save detail (qty only)
    document.getElementById('detail-save').addEventListener('click', async () => {
        if (!huidigeWijnId) return;
        try {
            await updateDoc(doc(db, 'wijnen', huidigeWijnId), { aantal: huidigeAantal });
            detailModal.classList.remove('actief');
            haalWijnenOp();
            toonToast('Wijzigingen opgeslagen');
        } catch (e) {
            console.error(e);
            toonToast('Opslaan mislukt');
        }
    });

    // Delete permanently
    document.getElementById('detail-delete').addEventListener('click', async () => {
        if (!huidigeWijnId) return;
        if (confirm('Deze wijn permanent verwijderen?')) {
            try {
                await deleteDoc(doc(db, 'wijnen', huidigeWijnId));
                detailModal.classList.remove('actief');
                haalWijnenOp();
                toonToast('Fles verwijderd');
            } catch (e) { console.error(e); }
        }
    });

    // Opgedronken → open review modal
    document.getElementById('detail-opgedronken').addEventListener('click', () => {
        detailModal.classList.remove('actief');
        document.getElementById('review-score-slider').value = 7;
        document.getElementById('review-score-display').textContent = '7';
        document.getElementById('review-notitie').value = '';
        document.getElementById('review-modal').classList.add('actief');
    });

    // Review slider
    document.getElementById('review-score-slider').addEventListener('input', (e) => {
        document.getElementById('review-score-display').textContent = e.target.value;
    });

    // Submit review
    document.getElementById('review-submit').addEventListener('click', async () => {
        if (!huidigeWijnId) return;
        try {
            await updateDoc(doc(db, 'wijnen', huidigeWijnId), {
                gedronken: true,
                rating: parseInt(document.getElementById('review-score-slider').value),
                notitie: document.getElementById('review-notitie').value,
                datumGedronken: new Date().toISOString()
            });
            document.getElementById('review-modal').classList.remove('actief');
            haalWijnenOp();
            toonToast('Beoordeling opgeslagen');
        } catch (e) {
            console.error(e);
            toonToast('Opslaan mislukt');
        }
    });

    // Skip review → just delete
    document.getElementById('review-skip').addEventListener('click', async () => {
        if (!huidigeWijnId) return;
        try {
            await deleteDoc(doc(db, 'wijnen', huidigeWijnId));
            document.getElementById('review-modal').classList.remove('actief');
            haalWijnenOp();
            toonToast('Fles verwijderd');
        } catch (e) { console.error(e); }
    });

    // === DATABASE ===
    async function haalWijnenOp() {
        wijnLijst.innerHTML = '<div class="laad-scherm"><span class="loader">Flessen aan het tellen...</span></div>';
        wijnen = [];
        try {
            const snap = await getDocs(collection(db, "wijnen"));
            snap.forEach((d) => wijnen.push({ id: d.id, ...d.data() }));
            tekenWijnen();
            tekenGedronken();
            updateStats();
        } catch (e) {
            console.error("Fout:", e);
            wijnLijst.innerHTML = '<div class="laad-scherm" style="color:#c0392b;">Kon de kelder niet openen.</div>';
        }
    }

    function updateStats() {
        const kelderWijnen = wijnen.filter(w => !w.gedronken);
        const totaalFlessen = kelderWijnen.reduce((sum, w) => sum + (w.aantal || 1), 0);
        document.getElementById('stat-totaal').textContent = totaalFlessen;
        document.getElementById('stat-rood').textContent = kelderWijnen.filter(w => w.kleur === 'Rood').reduce((s, w) => s + (w.aantal || 1), 0);
        document.getElementById('stat-wit').textContent = kelderWijnen.filter(w => w.kleur === 'Wit').reduce((s, w) => s + (w.aantal || 1), 0);
    }

    // ADD WINE
    document.getElementById('toevoeg-formulier').addEventListener('submit', async (e) => {
        e.preventDefault();
        const knop = document.getElementById('opslaan-knop');
        knop.innerText = "Opslaan..."; knop.disabled = true;

        const nieuweWijn = {
            naam: document.getElementById('invoer-naam').value || 'Onbekende Wijn',
            kleur: document.getElementById('invoer-kleur').value,
            jaartal: document.getElementById('invoer-jaartal').value,
            aantal: parseInt(document.getElementById('invoer-aantal').value) || 1,
            prijs: parseFloat(document.getElementById('invoer-prijs').value) || 0,
            smaakVanaf: document.getElementById('invoer-smaak').value,
            gedronken: false,
            datumToegevoegd: new Date().toISOString()
        };

        try {
            await addDoc(collection(db, "wijnen"), nieuweWijn);
            document.getElementById('toevoeg-formulier').reset();
            wisselScherm('kelder');
            haalWijnenOp();
            toonToast("Fles toegevoegd aan de kelder");
        } catch (err) {
            console.error("Fout:", err);
            toonToast("Er ging iets mis bij het opslaan");
        }
        knop.innerText = "Opslaan in Kelder"; knop.disabled = false;
    });

    // === TABS ===
    function wisselScherm(naam) {
        document.querySelectorAll('.scherm').forEach(s => s.classList.remove('actief'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('actief'));
        document.getElementById('scherm-' + naam).classList.add('actief');
        document.getElementById('tab-' + naam).classList.add('actief');
    }
    document.getElementById('tab-kelder').addEventListener('click', () => wisselScherm('kelder'));
    document.getElementById('tab-gedronken').addEventListener('click', () => wisselScherm('gedronken'));
    document.getElementById('tab-toevoegen').addEventListener('click', () => wisselScherm('toevoegen'));

    // === RENDER WINES (collapsible accordion) ===
    function kleurClass(kleur) {
        const m = { 'Rood': 'kleur-rood', 'Wit': 'kleur-wit', 'Rosé': 'kleur-rose', 'Champagne': 'kleur-champagne' };
        return m[kleur] || 'kleur-anders';
    }

    const kleurVolgorde = ['Rood', 'Wit', 'Rosé', 'Champagne', 'Anders'];
    const kleurDotKleuren = { 'Rood': '#9b2335', 'Wit': '#e8dcc8', 'Rosé': '#d4708f', 'Champagne': '#daa520', 'Anders': '#7a7268' };
    let openGroepen = new Set(['Rood']);

    function tekenWijnen() {
        const kelderWijnen = wijnen.filter(w => !w.gedronken);
        wijnLijst.innerHTML = '';

        if (kelderWijnen.length === 0) {
            wijnLijst.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2C12 2 9 8 9 12c0 1.66 1.34 3 3 3s3-1.34 3-3c0-4-3-10-3-10z"/><path d="M12 15v7M9 22h6"/></svg>
                <p>De kelder is leeg</p></div>`;
            return;
        }

        // Group by kleur
        const groepen = {};
        kleurVolgorde.forEach(k => groepen[k] = []);
        kelderWijnen.forEach(w => {
            const k = kleurVolgorde.includes(w.kleur) ? w.kleur : 'Anders';
            groepen[k].push(w);
        });

        kleurVolgorde.forEach(kleur => {
            const lijst = groepen[kleur];
            if (lijst.length === 0) return;

            const flessen = lijst.reduce((s, w) => s + (w.aantal || 1), 0);
            const isOpen = openGroepen.has(kleur);
            const dotColor = kleurDotKleuren[kleur];

            const groepDiv = document.createElement('div');
            groepDiv.className = 'kleur-groep';

            const header = document.createElement('div');
            header.className = 'kleur-groep-header' + (isOpen ? ' open' : '');
            header.innerHTML = `
                <div class="kleur-groep-left">
                    <div style="width:10px;height:10px;border-radius:50%;background:${dotColor};box-shadow:0 0 6px ${dotColor}40;"></div>
                    <div class="kleur-groep-naam">${kleur}</div>
                </div>
                <div class="kleur-groep-count">
                    ${flessen}
                    <svg class="kleur-groep-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>`;

            const body = document.createElement('div');
            body.className = 'kleur-groep-body' + (isOpen ? ' open' : '');

            header.addEventListener('click', () => {
                if (openGroepen.has(kleur)) openGroepen.delete(kleur);
                else openGroepen.add(kleur);
                header.classList.toggle('open');
                body.classList.toggle('open');
            });

            lijst.sort((a, b) => new Date(b.datumToegevoegd) - new Date(a.datumToegevoegd));

            lijst.forEach(wijn => {
                const k = document.createElement('div');
                k.className = 'wijn-kaart';
                k.style.cursor = 'pointer';
                k.addEventListener('click', () => openDetail(wijn.id));

                const prijs = wijn.prijs > 0 ? `\u20ac${wijn.prijs.toFixed(2)}` : '\u2014';
                const jaar = wijn.jaartal || '\u2014';
                const aantal = wijn.aantal || 1;
                const smaak = wijn.smaakVanaf ? `Op smaak: ${wijn.smaakVanaf}` : '';

                k.innerHTML = `
                    <div class="wijn-info">
                        <div class="wijn-naam">${wijn.naam}</div>
                        <div class="wijn-meta">
                            <span class="wijn-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>${jaar}</span>
                            <span class="wijn-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C12 2 9 8 9 12c0 1.66 1.34 3 3 3s3-1.34 3-3c0-4-3-10-3-10z"/><path d="M12 15v7M9 22h6"/></svg>${aantal}\u00d7</span>
                            <span class="wijn-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>\u20ac${wijn.prijs > 0 ? wijn.prijs.toFixed(2) : '\u2014'}</span>
                        </div>
                        ${smaak ? `<div class="wijn-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${smaak}</div>` : ''}
                    </div>`;
                body.appendChild(k);
            });

            groepDiv.appendChild(header);
            groepDiv.appendChild(body);
            wijnLijst.appendChild(groepDiv);
        });
    }

    // === RENDER GEDRONKEN ===
    function tekenGedronken() {
        const lijst = wijnen.filter(w => w.gedronken).sort((a, b) => {
            return new Date(b.datumGedronken || b.datumToegevoegd) - new Date(a.datumGedronken || a.datumToegevoegd);
        });
        const container = document.getElementById('gedronken-lijst');
        container.innerHTML = '';

        if (lijst.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M8 2h8l-1 7H9L8 2z"/><path d="M12 9v6"/><path d="M7 21h10"/><path d="M9 15h6"/></svg>
                <p>Nog geen wijnen gedronken</p></div>`;
            return;
        }

        lijst.forEach((wijn, i) => {
            const k = document.createElement('div');
            k.className = 'wijn-kaart';
            k.style.animationDelay = `${i * 0.06}s`;

            const score = wijn.rating || '\u2014';
            const datum = wijn.datumGedronken ? new Date(wijn.datumGedronken).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

            k.innerHTML = `
                <div class="wijn-info">
                    <div class="wijn-naam"><span class="wijn-kleur-indicator ${kleurClass(wijn.kleur)}"></span>${wijn.naam}</div>
                    <div style="display:flex;align-items:baseline;gap:8px;margin:6px 0;">
                        <span style="font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);font-weight:700;">${score}</span>
                        <span style="font-size:14px;color:var(--text-muted);">/10</span>
                    </div>
                    ${wijn.notitie ? `<div style="font-size:14px;color:var(--text-light);font-style:italic;margin-bottom:6px;line-height:1.4;">\u201c${wijn.notitie}\u201d</div>` : ''}
                    <div class="wijn-meta">
                        ${wijn.kleur ? `<span class="wijn-meta-item">${wijn.kleur}</span>` : ''}
                        ${wijn.jaartal ? `<span class="wijn-meta-item">${wijn.jaartal}</span>` : ''}
                        ${datum ? `<span class="wijn-meta-item">${datum}</span>` : ''}
                    </div>
                </div>
                <button class="verwijder-knop" onclick="event.stopPropagation();verwijderGedronken('${wijn.id}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                </button>`;
            container.appendChild(k);
        });
    }

    // Permanently delete from gedronken
    window.verwijderGedronken = async function(id) {
        if (confirm('Deze beoordeling permanent verwijderen?')) {
            try {
                await deleteDoc(doc(db, 'wijnen', id));
                haalWijnenOp();
                toonToast('Beoordeling verwijderd');
            } catch (e) { console.error(e); }
        }
    };

    // === SERVICE WORKER ===
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e));
    }
</script>
</body>
</html>
