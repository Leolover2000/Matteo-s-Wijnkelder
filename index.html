<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matteo's Wijnkelder</title>
    <style>
        /* CSS: Het stenen en houten ontwerp */
        :root {
            --hout-donker: #3e2723;
            --hout-licht: #5d4037;
            --steen-achtergrond: #1e1e1e;
            --steen-kaart: #2c2c2c;
            --text-licht: #e0e0e0;
            --text-accent: #d7ccc8;
            --goud: #bcaaa4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--steen-achtergrond);
            color: var(--text-licht);
            background-image: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Inlogscherm Specifiek */
        #login-sectie {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-box {
            background-color: var(--steen-kaart);
            padding: 30px;
            border-radius: 8px;
            border-top: 5px solid var(--hout-donker);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: var(--goud);
            font-family: 'Georgia', serif;
        }

        .foutmelding {
            color: #ff5252;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* Hoofd App Structuur (Verborgen tot inlog) */
        #app-sectie {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        header {
            background: linear-gradient(to bottom, var(--hout-donker), #2b1b18);
            color: white;
            text-align: center;
            padding: 20px;
            font-family: 'Georgia', serif;
            border-bottom: 3px solid #1a110f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            position: relative;
        }

        .uitlog-knop {
            position: absolute;
            right: 15px;
            top: 20px;
            background: none;
            border: 1px solid var(--goud);
            color: var(--goud);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        nav {
            display: flex;
            background-color: var(--hout-licht);
        }

        nav button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-accent);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        nav button.actief {
            background-color: var(--hout-donker);
            color: white;
            border-bottom: 3px solid var(--goud);
        }

        main { padding: 20px; overflow-y: auto; flex: 1;}
        .scherm { display: none; }
        .scherm.actief { display: block; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }

        select, input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background-color: var(--steen-kaart); color: white;
            border: 1px solid var(--hout-licht); border-radius: 6px; font-size: 16px;
        }

        label { display: block; margin-bottom: 5px; color: var(--goud); font-size: 14px; }

        .hoofd-knop {
            background: linear-gradient(to bottom, #795548, var(--hout-donker));
            color: white; border: 1px solid #1a110f; padding: 15px; width: 100%;
            font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }

        .wijn-kaart {
            background-color: var(--steen-kaart); border-left: 5px solid var(--hout-licht);
            border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative;
        }
        .wijn-naam { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .wijn-details { display: flex; flex-wrap: wrap; gap: 15px; font-size: 14px; color: #aaa; }
        .wijn-tag { background-color: var(--hout-donker); padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-top: 10px; display: inline-block; }
        .verwijder-knop { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff5252; font-size: 20px; cursor: pointer; }
        
        .laad-scherm { text-align: center; color: var(--goud); margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div id="login-sectie">
        <div class="login-box">
            <h2>Matteo's Wijnkelder</h2>
            <form id="login-formulier">
                <input type="email" id="login-email" placeholder="E-mailadres" required>
                <input type="password" id="login-wachtwoord" placeholder="Wachtwoord" required>
                <button type="submit" class="hoofd-knop" id="login-knop">Kluis Openen</button>
                <div id="login-fout" class="foutmelding">Inloggegevens onjuist.</div>
            </form>
        </div>
    </div>

    <div id="app-sectie">
        <header>
            <h1>Matteo's Wijnkelder</h1>
            <button class="uitlog-knop" id="uitlog-knop">Sluiten</button>
        </header>

        <nav>
            <button id="tab-kelder" class="actief">Mijn Kelder</button>
            <button id="tab-toevoegen">Fles Toevoegen</button>
        </nav>

        <main>
            <section id="scherm-kelder" class="scherm actief">
                <div class="controls">
                    <select id="filter-kleur">
                        <option value="Alle">Alle kleuren</option>
                        <option value="Wit">Wit</option>
                        <option value="Rood">Rood</option>
                        <option value="Rosé">Rosé</option>
                        <option value="Champagne">Champagne</option>
                        <option value="Anders">Anders</option>
                    </select>
                    <select id="sorteer-optie">
                        <option value="nieuwste">Nieuwste eerst</option>
                        <option value="prijs-hoog">Prijs (Hoog - Laag)</option>
                        <option value="prijs-laag">Prijs (Laag - Hoog)</option>
                        <option value="smaak-jaar">Op smaak (Eerstvolgende)</option>
                    </select>
                </div>
                <div id="wijn-lijst">
                    <div class="laad-scherm">Kelder wordt geopend...</div>
                </div>
            </section>

            <section id="scherm-toevoegen" class="scherm">
                <form id="toevoeg-formulier">
                    <label>Naam van de wijn (Optioneel)</label>
                    <input type="text" id="invoer-naam" placeholder="Bijv. Chateau Bordeaux">

                    <label>Kleur</label>
                    <select id="invoer-kleur">
                        <option value="Rood">Rood</option>
                        <option value="Wit">Wit</option>
                        <option value="Rosé">Rosé</option>
                        <option value="Champagne">Champagne</option>
                        <option value="Anders">Anders</option>
                    </select>

                    <label>Jaartal (Optioneel)</label>
                    <input type="number" id="invoer-jaartal" placeholder="Bijv. 2018">

                    <label>Prijs in € (Optioneel)</label>
                    <input type="number" step="0.01" id="invoer-prijs" placeholder="Bijv. 25.50">

                    <label>Op smaak vanaf jaar (Optioneel)</label>
                    <input type="number" id="invoer-smaak" placeholder="Bijv. 2028">

                    <button type="submit" class="hoofd-knop">🍷 Opslaan in de Cloud</button>
                </form>
            </section>
        </main>
    </div>
<script type="module">
        // 1. Importeer alle benodigde Firebase functies (inclusief inloggen en database) met versie 12.12.0
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // 2. Jouw web app's Firebase configuratie
        const firebaseConfig = {
            apiKey: "AIzaSyD8rkb6u4zVHQUBwKo0lfvhX17L5cz31I8", 
            authDomain: "matteo-s-wijnkelder.firebaseapp.com",
            projectId: "matteo-s-wijnkelder",
            storageBucket: "matteo-s-wijnkelder.firebasestorage.app",
            messagingSenderId: "800713019050",
            appId: "1:800713019050:web:ec3721b135b7a56e1acad3",
            measurementId: "G-M7DZ2P016W"
        };

        // 3. Initializeer Firebase, Auth en Firestore
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Globale lijst voor de wijnen
        let wijnen = [];
        
        // UI Elementen
        const loginSectie = document.getElementById('login-sectie');
        const appSectie = document.getElementById('app-sectie');
        const loginForm = document.getElementById('login-formulier');
        const loginFout = document.getElementById('login-fout');
        const wijnLijst = document.getElementById('wijn-lijst');

        // --- AUTHENTICATIE LOGICA ---

        // Luister of iemand is ingelogd
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Ingelogd! Verberg login, toon app
                loginSectie.style.display = 'none';
                appSectie.style.display = 'flex';
                haalWijnenOp(); // Haal data uit de cloud
            } else {
                // Uitgelogd! Toon login, verberg app
                loginSectie.style.display = 'flex';
                appSectie.style.display = 'none';
            }
        });

        // Inloggen
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const wachtwoord = document.getElementById('login-wachtwoord').value;
            const knop = document.getElementById('login-knop');
            
            knop.innerText = "Bezig...";
            loginFout.style.display = 'none';

            signInWithEmailAndPassword(auth, email, wachtwoord)
                .then(() => {
                    knop.innerText = "Kluis Openen";
                    loginForm.reset();
                })
                .catch((error) => {
                    knop.innerText = "Kluis Openen";
                    loginFout.style.display = 'block';
                    console.error("Inlog fout:", error);
                });
        });

        // Uitloggen
        document.getElementById('uitlog-knop').addEventListener('click', () => {
            signOut(auth);
        });

        // --- DATABASE LOGICA ---

        // Wijnen ophalen uit Firestore
        async function haalWijnenOp() {
            wijnLijst.innerHTML = '<div class="laad-scherm">Flessen aan het tellen...</div>';
            wijnen = [];
            
            try {
                const querySnapshot = await getDocs(collection(db, "wijnen"));
                querySnapshot.forEach((doc) => {
                    // Combineer de Firestore ID met de opgeslagen data
                    wijnen.push({ id: doc.id, ...doc.data() });
                });
                tekenWijnen();
            } catch (e) {
                console.error("Fout bij ophalen wijnen: ", e);
                wijnLijst.innerHTML = '<div class="laad-scherm" style="color:red;">Kon de kelder niet openen. Controleer Firebase instellingen.</div>';
            }
        }

        // Wijn toevoegen aan Firestore
        document.getElementById('toevoeg-formulier').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nieuweWijn = {
                naam: document.getElementById('invoer-naam').value || 'Onbekende Wijn',
                kleur: document.getElementById('invoer-kleur').value,
                jaartal: document.getElementById('invoer-jaartal').value,
                prijs: parseFloat(document.getElementById('invoer-prijs').value) || 0,
                smaakVanaf: document.getElementById('invoer-smaak').value,
                datumToegevoegd: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "wijnen"), nieuweWijn);
                document.getElementById('toevoeg-formulier').reset();
                wisselScherm('kelder');
                haalWijnenOp(); // Herlaad de lijst met de nieuwe fles
            } catch (e) {
                console.error("Fout bij toevoegen: ", e);
                alert("Er ging iets mis bij het opslaan in de cloud.");
            }
        });

        // Wijn verwijderen uit Firestore
        window.verwijderWijn = async function(id) {
            if(confirm("Heb je deze wijn opgedronken of wil je hem verwijderen?")) {
                try {
                    await deleteDoc(doc(db, "wijnen", id));
                    haalWijnenOp(); // Herlaad de lijst
                } catch (e) {
                    console.error("Fout bij verwijderen: ", e);
                }
            }
        }

        // --- UI & TAB LOGICA ---

        function wisselScherm(schermNaam) {
            document.getElementById('scherm-kelder').classList.remove('actief');
            document.getElementById('scherm-toevoegen').classList.remove('actief');
            document.getElementById('tab-kelder').classList.remove('actief');
            document.getElementById('tab-toevoegen').classList.remove('actief');

            document.getElementById('scherm-' + schermNaam).classList.add('actief');
            document.getElementById('tab-' + schermNaam).classList.add('actief');
        }

        document.getElementById('tab-kelder').addEventListener('click', () => wisselScherm('kelder'));
        document.getElementById('tab-toevoegen').addEventListener('click', () => wisselScherm('toevoegen'));

        // Tekenen en Filteren van wijnen
        function tekenWijnen() {
            const filterKleur = document.getElementById('filter-kleur').value;
            const sorteerOptie = document.getElementById('sorteer-optie').value;
            
            wijnLijst.innerHTML = ''; 

            let gefilterdeWijnen = wijnen;
            if (filterKleur !== 'Alle') {
                gefilterdeWijnen = wijnen.filter(wijn => wijn.kleur === filterKleur);
            }

            gefilterdeWijnen.sort((a, b) => {
                if (sorteerOptie === 'prijs-hoog') return b.prijs - a.prijs;
                if (sorteerOptie === 'prijs-laag') return a.prijs - b.prijs;
                if (sorteerOptie === 'smaak-jaar') {
                    const jaarA = a.smaakVanaf ? parseInt(a.smaakVanaf) : 9999;
                    const jaarB = b.smaakVanaf ? parseInt(b.smaakVanaf) : 9999;
                    return jaarA - jaarB;
                }
                return new Date(b.datumToegevoegd) - new Date(a.datumToegevoegd);
            });

            if (gefilterdeWijnen.length === 0) {
                wijnLijst.innerHTML = '<p style="text-align:center; color:#888; margin-top:40px;">Geen wijnen in deze categorie.</p>';
                return;
            }

            gefilterdeWijnen.forEach(wijn => {
                const kaart = document.createElement('div');
                kaart.className = 'wijn-kaart';
                
                const prijsTekst = wijn.prijs > 0 ? `€${wijn.prijs.toFixed(2)}` : 'Prijs onbekend';
                const jaartalTekst = wijn.jaartal ? `Jaar: ${wijn.jaartal}` : 'Jaar onbekend';
                const smaakTekst = wijn.smaakVanaf ? `Op smaak: ${wijn.smaakVanaf}` : '';

                kaart.innerHTML = `
                    <button class="verwijder-knop" onclick="verwijderWijn('${wijn.id}')">×</button>
                    <div class="wijn-naam">${wijn.naam}</div>
                    <div class="wijn-details">
                        <span>🍷 ${wijn.kleur}</span>
                        <span>📅 ${jaartalTekst}</span>
                        <span>💰 ${prijsTekst}</span>
                    </div>
                    ${smaakTekst ? `<div class="wijn-tag">⏳ ${smaakTekst}</div>` : ''}
                `;
                wijnLijst.appendChild(kaart);
            });
        }

        // Koppel filters aan de tekenfunctie
        document.getElementById('filter-kleur').addEventListener('change', tekenWijnen);
        document.getElementById('sorteer-optie').addEventListener('change', tekenWijnen);
    </script>
</body>
</html>
