<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matteo's Wijnkelder</title>
    <style>
        /* CSS: Het stenen en houten ontwerp */
        :root {
            --hout-donker: #3e2723;
            --hout-licht: #5d4037;
            --steen-achtergrond: #1e1e1e;
            --steen-kaart: #2c2c2c;
            --text-licht: #e0e0e0;
            --text-accent: #d7ccc8;
            --goud: #bcaaa4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--steen-achtergrond);
            color: var(--text-licht);
            /* Een subtiele stenen gradient */
            background-image: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header (Hout) */
        header {
            background: linear-gradient(to bottom, var(--hout-donker), #2b1b18);
            color: white;
            text-align: center;
            padding: 20px;
            font-family: 'Georgia', serif; /* Klassieker lettertype voor de titel */
            border-bottom: 3px solid #1a110f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Navigatie Tabs (Hout) */
        nav {
            display: flex;
            background-color: var(--hout-licht);
            border-bottom: 2px solid #3e2723;
        }

        nav button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-accent);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.actief {
            background-color: var(--hout-donker);
            color: white;
            border-bottom: 3px solid var(--goud);
        }

        /* Hoofdinhoud Container */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Schermen verbergen/tonen */
        .scherm {
            display: none;
        }

        .scherm.actief {
            display: block;
        }

        /* Formulieren en Filters */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: var(--steen-kaart);
            color: white;
            border: 1px solid var(--hout-licht);
            border-radius: 6px;
            font-size: 16px;
        }

        select {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--goud);
            font-size: 14px;
        }

        .hoofd-knop {
            background: linear-gradient(to bottom, #795548, var(--hout-donker));
            color: white;
            border: 1px solid #1a110f;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        /* Wijnkaarten (Steen) */
        .wijn-kaart {
            background-color: var(--steen-kaart);
            border-left: 5px solid var(--hout-licht);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            position: relative;
        }

        .wijn-naam {
            font-size: 20px;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .wijn-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .wijn-tag {
            background-color: var(--hout-donker);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-accent);
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        .verwijder-knop {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #ff5252;
            font-size: 20px;
            cursor: pointer;
        }

        .leeg-bericht {
            text-align: center;
            color: #888;
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>Matteo's Wijnkelder</h1>
    </header>

    <nav>
        <button id="tab-kelder" class="actief" onclick="wisselScherm('kelder')">Mijn Kelder</button>
        <button id="tab-toevoegen" onclick="wisselScherm('toevoegen')">Fles Toevoegen</button>
    </nav>

    <main>
        <section id="scherm-kelder" class="scherm actief">
            <div class="controls">
                <select id="filter-kleur" onchange="tekenWijnen()">
                    <option value="Alle">Alle kleuren</option>
                    <option value="Wit">Wit</option>
                    <option value="Rood">Rood</option>
                    <option value="Rosé">Rosé</option>
                    <option value="Champagne">Champagne</option>
                    <option value="Anders">Anders</option>
                </select>
                <select id="sorteer-optie" onchange="tekenWijnen()">
                    <option value="nieuwste">Nieuwste eerst</option>
                    <option value="prijs-hoog">Prijs (Hoog - Laag)</option>
                    <option value="prijs-laag">Prijs (Laag - Hoog)</option>
                    <option value="smaak-jaar">Op smaak (Eerstvolgende)</option>
                </select>
            </div>
            
            <div id="wijn-lijst">
                </div>
        </section>

        <section id="scherm-toevoegen" class="scherm">
            <form id="toevoeg-formulier" onsubmit="voegWijnToe(event)">
                <label>Naam van de wijn (Optioneel)</label>
                <input type="text" id="invoer-naam" placeholder="Bijv. Chateau Bordeaux">

                <label>Kleur</label>
                <select id="invoer-kleur">
                    <option value="Rood">Rood</option>
                    <option value="Wit">Wit</option>
                    <option value="Rosé">Rosé</option>
                    <option value="Champagne">Champagne</option>
                    <option value="Anders">Anders</option>
                </select>

                <label>Jaartal (Optioneel)</label>
                <input type="number" id="invoer-jaartal" placeholder="Bijv. 2018">

                <label>Prijs in € (Optioneel)</label>
                <input type="number" step="0.01" id="invoer-prijs" placeholder="Bijv. 25.50">

                <label>Op smaak vanaf jaar (Optioneel)</label>
                <input type="number" id="invoer-smaak" placeholder="Bijv. 2028">

                <button type="submit" class="hoofd-knop">🍷 Opslaan in Kelder</button>
            </form>
        </section>
    </main>

    <script>
        // JAVASCRIPT: De logica van de app

        // 1. Data ophalen uit het geheugen van de browser, of een lege lijst starten
        let wijnen = JSON.parse(localStorage.getItem('matteosWijnen')) || [];

        // 2. Functie om te wisselen tussen de twee schermen
        function wisselScherm(schermNaam) {
            document.getElementById('scherm-kelder').classList.remove('actief');
            document.getElementById('scherm-toevoegen').classList.remove('actief');
            document.getElementById('tab-kelder').classList.remove('actief');
            document.getElementById('tab-toevoegen').classList.remove('actief');

            document.getElementById('scherm-' + schermNaam).classList.add('actief');
            document.getElementById('tab-' + schermNaam).classList.add('actief');

            if(schermNaam === 'kelder') {
                tekenWijnen();
            }
        }

        // 3. Functie om een nieuwe wijn op te slaan
        function voegWijnToe(event) {
            event.preventDefault(); // Voorkomt dat de pagina herlaadt

            const nieuweWijn = {
                id: Date.now(), // Unieke code gebaseerd op de tijd
                naam: document.getElementById('invoer-naam').value || 'Onbekende Wijn',
                kleur: document.getElementById('invoer-kleur').value,
                jaartal: document.getElementById('invoer-jaartal').value,
                prijs: parseFloat(document.getElementById('invoer-prijs').value) || 0,
                smaakVanaf: document.getElementById('invoer-smaak').value,
                datumToegevoegd: new Date().toISOString()
            };

            wijnen.push(nieuweWijn);
            slaOpEnHerlaad();
            
            // Maak formulier leeg
            document.getElementById('toevoeg-formulier').reset();
            
            // Ga terug naar het overzicht
            wisselScherm('kelder');
        }

        // 4. Functie om een wijn te verwijderen (mocht hij opgedronken zijn!)
        function verwijderWijn(id) {
            if(confirm("Heb je deze wijn opgedronken of wil je hem verwijderen?")) {
                wijnen = wijnen.filter(wijn => wijn.id !== id);
                slaOpEnHerlaad();
            }
        }

        // 5. Functie om data op te slaan in de browser
        function slaOpEnHerlaad() {
            localStorage.setItem('matteosWijnen', JSON.stringify(wijnen));
            tekenWijnen();
        }

        // 6. De belangrijkste functie: De wijnen op het scherm tekenen
        function tekenWijnen() {
            const lijstContainer = document.getElementById('wijn-lijst');
            const filterKleur = document.getElementById('filter-kleur').value;
            const sorteerOptie = document.getElementById('sorteer-optie').value;
            
            lijstContainer.innerHTML = ''; // Maak de lijst eerst leeg

            // Filteren
            let gefilterdeWijnen = wijnen;
            if (filterKleur !== 'Alle') {
                gefilterdeWijnen = wijnen.filter(wijn => wijn.kleur === filterKleur);
            }

            // Sorteren
            gefilterdeWijnen.sort((a, b) => {
                if (sorteerOptie === 'prijs-hoog') return b.prijs - a.prijs;
                if (sorteerOptie === 'prijs-laag') return a.prijs - b.prijs;
                if (sorteerOptie === 'smaak-jaar') {
                    // Als er geen smaakjaar is ingevuld, zet deze dan achteraan
                    const jaarA = a.smaakVanaf ? parseInt(a.smaakVanaf) : 9999;
                    const jaarB = b.smaakVanaf ? parseInt(b.smaakVanaf) : 9999;
                    return jaarA - jaarB;
                }
                // Standaard: Nieuwste eerst (datum)
                return new Date(b.datumToegevoegd) - new Date(a.datumToegevoegd);
            });

            // Als er geen wijnen zijn
            if (gefilterdeWijnen.length === 0) {
                lijstContainer.innerHTML = '<p class="leeg-bericht">Geen wijnen gevonden in deze categorie.</p>';
                return;
            }

            // HTML maken voor elke wijn
            gefilterdeWijnen.forEach(wijn => {
                const kaart = document.createElement('div');
                kaart.className = 'wijn-kaart';
                
                // Formatteer details die leeg kunnen zijn
                const prijsTekst = wijn.prijs > 0 ? `€${wijn.prijs.toFixed(2)}` : 'Prijs onbekend';
                const jaartalTekst = wijn.jaartal ? `Jaar: ${wijn.jaartal}` : 'Jaar onbekend';
                const smaakTekst = wijn.smaakVanaf ? `Op smaak vanaf: ${wijn.smaakVanaf}` : '';

                kaart.innerHTML = `
                    <button class="verwijder-knop" onclick="verwijderWijn(${wijn.id})">×</button>
                    <div class="wijn-naam">${wijn.naam}</div>
                    <div class="wijn-details">
                        <span>🍷 ${wijn.kleur}</span>
                        <span>📅 ${jaartalTekst}</span>
                        <span>💰 ${prijsTekst}</span>
                    </div>
                    ${smaakTekst ? `<div class="wijn-tag">⏳ ${smaakTekst}</div>` : ''}
                `;
                
                lijstContainer.appendChild(kaart);
            });
        }

        // Start de app door de lijst 1x te tekenen
        tekenWijnen();
    </script>
</body>
</html>
